<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serums</title>
  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5f6f82;
      --accent: #2563eb;
      --accent2: #0f766e;
      --border: #d8e1ea;
      --shadow: 0 12px 30px rgba(16, 24, 40, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #f8fbff, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 40px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .badge { background: rgba(37, 99, 235, 0.10); color: var(--accent); border: 1px solid rgba(37, 99, 235, 0.18); padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 18px; }
    .card, .side { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
    .card { overflow: hidden; }
    .hero { height: 150px; background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(15,118,110,.92)); padding: 18px; color: white; display: flex; flex-direction: column; justify-content: flex-end; }
    .hero .kicker { font-size: 12px; opacity: 0.9; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
    .hero .title { font-size: 26px; font-weight: 800; line-height: 1.15; margin: 0; }
    .content { padding: 20px; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .pill { background: #f4f7fb; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    .statement, .question { margin: 0 0 14px; font-size: 15px; line-height: 1.6; color: #24364a; }
    .section-label { font-size: 12px; text-transform: uppercase; letter-spacing: .10em; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
    .options { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
    .option { border: 1px solid var(--border); background: #fbfdff; border-radius: 14px; padding: 12px 14px; color: #223549; line-height: 1.45; }
    .option.correct { border-color: rgba(15, 118, 110, 0.35); background: rgba(15, 118, 110, 0.07); box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08); }
    .answer { margin-top: 16px; padding: 14px; border-radius: 14px; background: rgba(37, 99, 235, 0.08); border: 1px solid rgba(37, 99, 235, 0.16); }
    .answer strong { color: var(--accent); }
    .side { padding: 18px; align-self: start; }
    .side h2 { margin: 0 0 12px; font-size: 18px; }
    .side p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; font-size: 14px; }
    .stats { display: grid; gap: 10px; margin-top: 14px; }
    .stat { border: 1px solid var(--border); background: #fbfdff; border-radius: 14px; padding: 12px; }
    .stat b { display: block; font-size: 20px; color: var(--accent2); margin-bottom: 3px; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .hero { height: auto; min-height: 130px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Serums</h1>
        <p class="subtitle">Una sola tarjeta de caso con diseño completo.</p>
      </div>
      <div class="badge">Operativo</div>
    </div>

    <div id="app">Cargando...</div>
  </div>

  <script>
    window.SERUMS_DATA = {
      cases: [
        {
          id: 1,
          title: "Riesgo suicida en adolescente",
          block: "Psicología",
          level: "I-2",
          statement: "Adolescente de 16 años llega al establecimiento con ideación suicida, aislamiento y soporte familiar limitado.",
          question: "¿Cuál es la conducta más adecuada?",
          options: [
            "Dar consejería breve y citar en una semana.",
            "Intervenir en crisis, estabilizar y derivar urgentemente.",
            "Indicar reposo y observación domiciliaria."
          ],
          correct: 1,
          feedback: "La conducta correcta es intervenir en crisis, estabilizar y derivar con urgencia.",
          tags: ["salud mental", "crisis", "derivación"]
        }
      ]
    };
  </script>

  <script>
    (function () {
      const app = document.getElementById("app");
      const c = window.SERUMS_DATA.cases[0];
      app.innerHTML = `
        <div class="grid">
          <article class="card">
            <div class="hero">
              <div class="kicker">${c.block} · Nivel ${c.level}</div>
              <h2 class="title">${c.title}</h2>
            </div>
            <div class="content">
              <div class="meta">
                ${c.tags.map(t => `<span class="pill">${t}</span>`).join("")}
              </div>

              <div class="section-label">Situación</div>
              <p class="statement">${c.statement}</p>

              <div class="section-label">Pregunta</div>
              <p class="question">${c.question}</p>

              <div class="section-label">Opciones</div>
              <ul class="options">
                ${c.options.map((o, i) => `<li class="option ${i === c.correct ? 'correct' : ''}">${String.fromCharCode(65 + i)}. ${o}</li>`).join("")}
              </ul>

              <div class="answer">
                <strong>Respuesta:</strong> ${c.feedback}
              </div>
            </div>
          </article>

          <aside class="side">
            <h2>Resumen del caso</h2>
            <p>La página ya parte desde cero y muestra un solo caso con diseño completo.</p>
            <div class="stats">
              <div class="stat"><b>1</b><span>Caso visible</span></div>
              <div class="stat"><b>${c.options.length}</b><span>Opciones</span></div>
              <div class="stat"><b>${c.correct + 1}</b><span>Respuesta correcta</span></div>
            </div>
          </aside>
        </div>
      `;
    })();
  </script>
</body>
</html>
