<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERUMS Perú</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>SERUMS Perú</h1>
        <p>Plataforma interactiva de estudio, normativa y práctica para la evaluación SERUMS.</p>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Tablero</button>
        <button class="nav-btn" data-view="cases">Casos</button>
        <button class="nav-btn" data-view="norms">Normativa</button>
        <button class="nav-btn" data-view="decrees">Decretos</button>
        <button class="nav-btn" data-view="resources">Recursos</button>
      </nav>

      <div class="sidebar-footer">
        <div class="mini-card">
          <span>Puntaje</span>
          <strong id="score-badge">0</strong>
        </div>
        <div class="mini-card">
          <span>Casos resueltos</span>
          <strong id="resolved-badge">0</strong>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <h2 id="page-title">Tablero SERUMS</h2>
        <p id="page-subtitle">Casos, normativa y seguimiento en una sola vista.</p>
      </header>

      <section id="view-root"></section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
