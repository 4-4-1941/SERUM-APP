<script>
(function(){
  const data = window.SERUMS_DATA;
  const casesEl = document.getElementById("cases");
  const chipsEl = document.getElementById("chips");
  const normsEl = document.getElementById("norms");
  const decreesEl = document.getElementById("decrees");
  const resourcesEl = document.getElementById("resources");
  const casesCount = document.getElementById("casesCount");
  const openCount = document.getElementById("openCount");
  const tagCount = document.getElementById("tagCount");

  let activeFilter = "Todos";
  let openId = data.cases[0] ? data.cases[0].id : null;

  function renderSide(){
    normsEl.innerHTML = (data.norms || []).map(x => `<li>${x}</li>`).join("");
    decreesEl.innerHTML = (data.decrees || []).map(x => `<li>${x}</li>`).join("");
    resourcesEl.innerHTML = (data.resources || []).map(x => `<li>${x}</li>`).join("");
    casesCount.textContent = (data.cases || []).length;
    tagCount.textContent = (data.chips || []).length ? (data.chips.length - 1) : 0;
  }

  function renderChips(){
    chipsEl.innerHTML = (data.chips || []).map(ch => `
      <button class="chip ${activeFilter===ch?'active':''}" data-chip="${ch}" type="button">${ch}</button>
    `).join("");
  }

  function filteredCases(){
    if(activeFilter === "Todos") return data.cases || [];
    return (data.cases || []).filter(c => c.block === activeFilter || c.specialty === activeFilter);
  }

  function renderCases(){
    const arr = filteredCases();
    if(!arr.length){
      casesEl.innerHTML = `<div class="acc-item"><div class="acc-btn"><div><div class="acc-title">No hay casos</div><div class="acc-meta">Revisa el filtro seleccionado</div></div></div></div>`;
      openCount.textContent = "0";
      return;
    }

    if(!arr.some(c => c.id === openId)) openId = arr[0].id;

    casesEl.innerHTML = arr.map(c => `
      <article class="acc-item ${openId===c.id ? 'open' : ''}" data-id="${c.id}">
        <button class="acc-btn" type="button" data-action="toggle-case">
          <div>
            <div class="acc-title">${c.title}</div>
            <div class="acc-meta">${c.block} · ${c.level} · ${c.specialty}</div>
          </div>
          <div class="chev">⌄</div>
        </button>
        <div class="acc-panel">
          <div class="acc-inner">
            <div class="kvs">${(c.tags || []).map(t => `<span class="pill">${t}</span>`).join("")}</div>
            <div class="section-label">Situación</div>
            <p class="statement">${c.statement || ""}</p>
            <div class="section-label">Pregunta</div>
            <p class="question">${c.question || ""}</p>
            <div class="section-label">Opciones</div>
            <ul class="options">
              ${(c.options || []).map((o,i)=>`<li class="option ${i===c.correct?'correct':''}">${String.fromCharCode(65+i)}. ${o}</li>`).join("")}
            </ul>
            <div class="answer"><strong>Respuesta:</strong> ${c.feedback || ""}</div>
          </div>
        </div>
      </article>
    `).join("");

    openCount.textContent = "1";
  }

  chipsEl.addEventListener("click", (e) => {
    const b = e.target.closest("[data-chip]");
    if(!b) return;
    activeFilter = b.dataset.chip;
    renderChips();
    renderCases();
  });

  casesEl.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action='toggle-case']");
    if(!btn) return;
    const item = btn.closest(".acc-item");
    const id = Number(item.dataset.id);
    openId = (openId === id) ? null : id;
    renderCases();
  });

  function tick(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("timer").textContent = `${hh}:${mm}:${ss}`;
  }

  renderSide();
  renderChips();
  renderCases();
  tick();
  setInterval(tick, 1000);
})();
    </script>
