<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERUMS Perú · Preparación interactiva</title>
  <meta name="description" content="Aplicación de estudio para el proceso SERUMS Perú: casos clínicos interactivos, normativa oficial y seguimiento de progreso." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>SERUMS Perú</h1>
        <p>Preparación para el Servicio Rural y Urbano Marginal de Salud. Casos clínicos, normativa oficial y seguimiento de estudio.</p>
      </div>

      <nav class="nav">
        <button class="nav-btn" data-view="dashboard" type="button">Tablero</button>
        <button class="nav-btn" data-view="cases" type="button">Casos clínicos</button>
        <button class="nav-btn" data-view="simulacro" type="button">Simulacro (100)</button>
        <button class="nav-btn" data-view="norms" type="button">Normativa</button>
        <button class="nav-btn" data-view="decrees" type="button">Decretos y lineamientos</button>
        <button class="nav-btn" data-view="resources" type="button">Recursos</button>
      </nav>

      <div class="sidebar-footer">
        <div class="mini-card">
          <span>Puntaje</span>
          <strong id="score-badge">0</strong>
        </div>
        <div class="mini-card">
          <span>Casos resueltos</span>
          <strong id="resolved-badge">0</strong>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <h2 id="page-title">Tablero SERUMS</h2>
        <p id="page-subtitle">Casos, normativa y progreso en una sola vista.</p>
      </div>
      <div id="view-root"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <div id="print-report" class="print-only"></div>
</body>
</html>
