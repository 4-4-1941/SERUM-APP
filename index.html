<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casos</title>
  <style>
    :root {
      --bg: #eaf2ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #dbe6ff;
      --shadow: 0 10px 30px rgba(37, 99, 235, 0.10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
    }

    .panel, .case-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      margin-bottom: 18px;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stat {
      flex: 1 1 180px;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .stat .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .case-card {
      padding: 18px;
    }

    .case-card h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .case-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      background: #eff6ff;
      color: var(--text);
      border: 1px solid #cfe0ff;
      transition: 0.2s ease;
      text-align: left;
    }

    button:hover {
      background: #dbeafe;
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Casos</h1>
      <p>Responde cada caso y revisa tu progreso.</p>
    </div>

    <div id="app"></div>
  </div>

  <script>
    const cases = [
      {
        id: 1,
        title: "Caso 1",
        question: "¿Qué pasa con este paciente?",
        options: ["Respuesta A", "Respuesta B", "Respuesta C"],
        answer: 1,
        explanation: "Explicación corta del caso 1."
      },
      {
        id: 2,
        title: "Caso 2",
        question: "¿Cuál es la respuesta correcta?",
        options: ["Opción A", "Opción B", "Opción C"],
        answer: 0,
        explanation: "Explicación corta del caso 2."
      }
    ];

    const state = {
      completed: Number(localStorage.getItem("preSerumCompleted") || 0),
      correct: Number(localStorage.getItem("preSerumCorrect") || 0)
    };

    function saveState() {
      localStorage.setItem("preSerumCompleted", String(state.completed));
      localStorage.setItem("preSerumCorrect", String(state.correct));
    }

    function updateStats(ok) {
      state.completed += 1;
      if (ok) state.correct += 1;
      saveState();
    }

    function getAccuracy() {
      return state.completed ? Math.round((state.correct / state.completed) * 100) : 0;
    }

    function renderStatsCard() {
      return `
        <div class="panel">
          <div class="stats">
            <div class="stat">
              <span class="label">Casos resueltos</span>
              <span class="value">${state.completed}</span>
            </div>
            <div class="stat">
              <span class="label">Respuestas correctas</span>
              <span class="value">${state.correct}</span>
            </div>
            <div class="stat">
              <span class="label">Precisión</span>
              <span class="value">${getAccuracy()}%</span>
            </div>
          </div>
          <div class="footer-note">Tu progreso se guarda en este navegador.</div>
        </div>
      `;
    }

    function safeText(value, fallback = "") {
      return typeof value === "string" && value.trim() ? value : fallback;
    }

    function renderCases() {
      const items = cases.map((c, index) => `
        <div class="case-card">
          <h3>${safeText(c.title, `Caso ${index + 1}`)}</h3>
          <p>${safeText(c.question, "Sin pregunta")}</p>
          <div class="options">
            ${c.options.map((opt, i) => `
              <button onclick="answerCase(${c.id}, ${i})">${opt}</button>
            `).join("")}
          </div>
        </div>
      `).join("");

      document.getElementById("app").innerHTML = renderStatsCard() + `<div class="grid">${items}</div>`;
    }

    function answerCase(caseId, selectedIndex) {
      const c = cases.find(x => x.id === caseId);
      if (!c) return;

      const ok = selectedIndex === c.answer;
      updateStats(ok);

      alert(ok ? "Correcto" : `Incorrecto. ${c.explanation}`);
      renderCases();
    }

    document.addEventListener("DOMContentLoaded", renderCases);
  </script>
</body>
</html>
