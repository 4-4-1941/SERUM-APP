<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serums</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; color: #222; }
    h1 { margin-bottom: 8px; }
    .meta { color: #555; margin-bottom: 16px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .tag { display: inline-block; background: #eef; color: #334; padding: 4px 8px; border-radius: 999px; margin: 0 6px 6px 0; font-size: 12px; }
    ol { padding-left: 20px; }
    .ok { color: #0a7a0a; font-weight: 700; }
    .bad { color: #b00020; font-weight: 700; }
  </style>
</head>
<body>
  <div id="app">Cargando...</div>

  <script>
    window.SERUMS_DATA = {
      cases: [
        {
          id: 1,
          title: "Riesgo suicida en adolescente",
          block: "Psicología",
          level: "I-2",
          statement: "Adolescente de 16 años llega al establecimiento con ideación suicida, aislamiento y soporte familiar limitado.",
          question: "¿Cuál es la conducta más adecuada?",
          options: [
            "Dar consejería breve y citar en una semana.",
            "Intervenir en crisis, estabilizar y derivar urgentemente.",
            "Indicar reposo y observación domiciliaria."
          ],
          correct: 1,
          tags: ["salud mental", "crisis", "derivación"]
        },
        {
          id: 2,
          title: "Violencia familiar con ansiedad",
          block: "Psicología",
          level: "I-2",
          statement: "Mujer adulta consulta por insomnio, ansiedad y dolor somático. Refiere violencia familiar y temor al regresar a casa.",
          question: "¿Qué acción corresponde primero?",
          options: [
            "Tamizar riesgo, brindar soporte inicial y derivar según norma.",
            "Solo prescribir descanso y control posterior.",
            "Ignorar el antecedente para evitar revictimización."
          ],
          correct: 0,
          tags: ["violencia familiar", "ansiedad", "tamizaje"]
        },
        {
          id: 3,
          title: "Ataque de pánico en consulta",
          block: "Psicología",
          level: "I-2",
          statement: "Paciente de 24 años presenta respiración rápida, sensación de muerte inminente y temor intenso.",
          question: "¿Qué medida inicial es la más adecuada?",
          options: [
            "Brindar contención, evaluación breve y manejo inicial.",
            "Administrar cualquier sedante sin evaluación.",
            "Citar en un mes sin intervención."
          ],
          correct: 0,
          tags: ["ansiedad", "crisis", "contención"]
        }
      ]
    };
  </script>

  <script>
    (function () {
      const app = document.getElementById("app");
      const data = window.SERUMS_DATA;

      if (!data || !Array.isArray(data.cases) || !data.cases.length) {
        app.innerHTML = '<p class="bad">No hay casos para mostrar.</p>';
        return;
      }

      const c = data.cases[0];
      app.innerHTML = `
        <h1>Serums</h1>
        <div class="meta">${data.cases.length} casos cargados · mostrando el primero</div>
        <div class="card">
          <div>${c.block} · ${c.level}</div>
          <h2>${c.title}</h2>
          <p>${c.statement}</p>
          <p><strong>Pregunta:</strong> ${c.question}</p>
          <ol>${c.options.map(o => `<li>${o}</li>`).join("")}</ol>
          <p class="ok">Funciona: la página está cargando datos y mostrando contenido.</p>
          <div>${c.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
        </div>
      `;
    })();
  </script>
</body>
</html>
